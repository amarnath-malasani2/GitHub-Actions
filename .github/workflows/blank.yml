name: Simple Workflow
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "checkout code"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run tests
        run: echo "running tests"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Build project
        run: echo "building project"
