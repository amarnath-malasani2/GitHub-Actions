name: Env Demo
on:
    workflow_dispatch:

env:
    GREETING: "Hello, World!"
    APP_NAME: "My Application"
    ENVIRONMENT: "production"

jobs:
    env-demo:
        env:
          ENVIRONMENT: "Test"
        runs-on: ubuntu-latest
        steps:
            - name: Print Greeting
              env:
                ENVIRONMENT: "Dev"
              run: echo "$GREETING"

            - name: Print App Name
              run: echo "$APP_NAME"

            - name: Print Environment
              run: echo "$ENVIRONMENT"
