name: Env Demo
on:
    workflow_dispatch:

env:
    GREETING: "Hello, World!"
    APP_NAME: "My Application"
    ENVIRONMENT: "production"

jobs:
    env-demo:
        runs-on: ubuntu-latest
        steps:
            - name: Print Greeting
              run: echo "$GREETING"

            - name: Print App Name
              run: echo "$APP_NAME"

            - name: Print Environment
              run: echo "$ENVIRONMENT"
